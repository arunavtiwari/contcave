name: Staging E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed staging URL"
        required: false
        type: string
      email_domain:
        description: "Deliverable QA email domain for generated users"
        required: false
        type: string

concurrency:
  group: staging-e2e
  cancel-in-progress: false

jobs:
  staging-e2e:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 60

    env:
      E2E_BASE_URL: ${{ inputs.base_url || secrets.E2E_BASE_URL }}
      E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      E2E_ALLOW_STAGING_WRITES: "true"
      E2E_ALLOWED_DATABASE_NAMES: contcave
      E2E_EMAIL_DOMAIN: ${{ inputs.email_domain || secrets.E2E_EMAIL_DOMAIN }}
      E2E_BANK_ACCOUNT_NUMBER: ${{ secrets.E2E_BANK_ACCOUNT_NUMBER }}
      E2E_BANK_IFSC: ${{ secrets.E2E_BANK_IFSC }}
      E2E_BANK_NAME: ${{ secrets.E2E_BANK_NAME }}
      E2E_BANK_HOLDER: ${{ secrets.E2E_BANK_HOLDER }}
      E2E_CASHFREE_PAYMENT_METHOD: ${{ secrets.E2E_CASHFREE_PAYMENT_METHOD }}
      E2E_RUN_ID: qa-e2e-${{ github.run_id }}-${{ github.run_attempt }}
      CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run staging E2E
        run: npm run test:e2e:staging

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-e2e-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
