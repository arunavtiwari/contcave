name: Booking Reminder Cron Job

on:
  schedule:
    # Run daily at 06:00 UTC (11:30 IST)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  trigger-booking-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Booking Reminder
        run: |
          echo "Triggering booking reminder cron job..."

          ENDPOINT="https://contcave.com/api/cron/booking-reminder"

          echo "Endpoint: $ENDPOINT"

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            --retry 3 --retry-delay 5 --max-time 30 \
            -X GET "$ENDPOINT" \
            -H "x-github-secret: ${{ secrets.CRON_SECRET }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $RESPONSE_BODY"

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Booking reminder cron job executed successfully"
          else
            echo "❌ Booking reminder cron job failed with status: $HTTP_CODE"
            echo "Response: $RESPONSE_BODY"
            exit 1
          fi

      - name: Log Results
        if: always()
        run: |
          echo "Booking reminder cron job completed at $(date -u) UTC"
